<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Real-time Location</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Gaya untuk loading overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2>📍 Mencari Lokasi Kamu...</h2>
        <p>Pastikan klik "Allow/Izinkan" pada browser ya!</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inisialisasi Peta (Default ke Jakarta dulu)
        const map = L.map('map').setView([-6.2088, 106.8456], 13);

        // 2. Tambahkan Lapisan Peta (OpenStreetMap - Gratis!)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Fungsi Ambil Lokasi Real-time
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                // Sembunyikan loader
                document.getElementById('loader').style.display = 'none';

                // Pindahkan kamera ke lokasi user
                map.setView([lat, lng], 16);

                // Tambahkan Marker
                const marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(`<b>Kamu di sini!</b><br>Akurasi: ${Math.round(accuracy)} meter`)
                    .openPopup();

                // Tambahkan lingkaran biru (radius akurasi)
                L.circle([lat, lng], { radius: accuracy, color: '#3388ff', fillOpacity: 0.2 }).addTo(map);

            }, function(error) {
                document.getElementById('loader').innerHTML = `<h2>❌ Gagal mengambil lokasi</h2><p>${error.message}</p>`;
            }, {
                enableHighAccuracy: true // Minta akurasi maksimal (GPS)
            });
        } else {
            alert("Browser kamu tidak mendukung fitur lokasi.");
        }
    </script>
</body>
</html>
